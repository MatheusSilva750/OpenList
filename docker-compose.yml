services:
  db:
    image: postgres:15-alpine
    container_name: openlist-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: super-secure-db-password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  supabase-auth:
    image: supabase/gotrue:v2.146.0
    container_name: openlist-auth
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9999:9999"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3
    environment:
      API_EXTERNAL_URL: http://localhost:54321/auth/v1
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DATABASE_URL: postgres://postgres:super-secure-db-password@db:5432/postgres?sslmode=disable&search_path=auth
      DATABASE_URL: postgres://postgres:super-secure-db-password@db:5432/postgres?sslmode=disable&search_path=auth
      GOTRUE_JWT_SECRET: super-secret-jwt-key-for-local-supabase-auth-32chars
      GOTRUE_JWT_EXP: 3600
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: http://localhost:3000/*
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"

  supabase-gateway:
    image: nginx:alpine
    container_name: openlist-gateway
    depends_on:
      - supabase-auth
    ports:
      - "54321:54321"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    build:
      context: ./backend
    container_name: openlist-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=super-secure-db-password
      - DB_HOST=db
      - DB_PORT=5432
      - SUPABASE_JWT_SECRET=super-secret-jwt-key-for-local-supabase-auth-32chars
      - DJANGO_SECRET_KEY=django-super-secret-local-key-for-testing-12345
      - DJANGO_DEBUG=True
      - ALLOWED_HOSTS=*
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: openlist-frontend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - VITE_SUPABASE_URL=http://localhost:54321
      - VITE_SUPABASE_ANON_KEY=dummy-anon-key-since-gotrue-is-hit-directly-and-does-not-require-it
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
